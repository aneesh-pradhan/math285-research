name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex

      # TODO: If tex-to-html.sh requires tools like pandoc or make4ht,
      # install them via apt-get before running the script, e.g.:
      #   sudo apt-get update && sudo apt-get install -y pandoc make4ht
      - name: Make conversion script executable
        run: chmod +x tex-to-html.sh

      - name: Run HTML conversion script
        run: ./tex-to-html.sh

      - name: Create public directory
        run: mkdir public

      - name: Move artifacts into public
        run: |
          mv main.pdf public/
          mv index.html public/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
